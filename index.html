<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Cube 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* Background Image */
    background: url('./1.jpeg') no-repeat center/cover;
   
   
}


/* Dark overlay for better visibility */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
    z-index: -1;
}

/* Scene */
.scene {
    width: 60vw;
    height: 60vw;
    max-width: 280px;
    max-height: 280px;
    perspective: 800px;
}
/* Cube */
.cube {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCube 8s infinite linear;
}

/* Faces */
.face {
    position: absolute;
    width: 100%;
    height: 100%;
    
    background-size: cover;      /* FIX */
    background-position: center; /* FIX */
    background-repeat: no-repeat;

    box-sizing: border-box;
    backface-visibility: hidden;
    border: none;
     border-radius: 10px;
}

/* Mobile depth */
.front  { transform: rotateY(0deg) translateZ(28.5vw); }
.back   { transform: rotateY(180deg) translateZ(28.5vw); }
.right  { transform: rotateY(90deg) translateZ(28.5vw); }
.left   { transform: rotateY(-90deg) translateZ(28.5vw); }
.top    { transform: rotateX(90deg) translateZ(28.5vw); }
.bottom { transform: rotateX(-90deg) translateZ(28.5vw); }

/* Animation */
@keyframes rotateCube {
    from { transform: rotateX(0deg) rotateY(0deg); }
    to   { transform: rotateX(360deg) rotateY(360deg); }
}

/* Desktop Fix */
@media (min-width: 768px) {
    .scene {
        width: 320px;
        height: 320px;
    }

    .front  { transform: rotateY(0deg) translateZ(160px); }
    .back   { transform: rotateY(180deg) translateZ(160px); }
    .right  { transform: rotateY(90deg) translateZ(160px); }
    .left   { transform: rotateY(-90deg) translateZ(160px); }
    .top    { transform: rotateX(90deg) translateZ(160px); }
    .bottom { transform: rotateX(-90deg) translateZ(160px); }
}
body {
    position: relative; /* IMPORTANT */
}
.birthday-text {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;

    text-align: center;
    font-size: 6vw;
    color: white;
    font-weight: bold;

    z-index: 20; /* increase */

    text-shadow: 
        0 0 10px #ff4da6,
        0 0 20px #ff4da6,
        0 0 40px #ff4da6;
}
/* Desktop fix */
@media (min-width: 768px) {
    .birthday-text {
        font-size: 28px;
    }
}
@keyframes floatText {
    0% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -10px); }
    100% { transform: translate(-50%, 0); }
}
@keyframes floatText {
    0% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-10px); }
    100% { transform: translateX(-50%) translateY(0); }
}
@keyframes floatUp {
    from {
        transform: translateY(0);
        opacity: 1;
    }
    to {
        transform: translateY(-100vh);
        opacity: 0;
    }
}
#playBtn {
    position: fixed;
    bottom: 15px;
    left: 15px;   /* LEFT side */

    padding: 8px 15px;
    font-size: 14px;

    border: none;
    border-radius: 20px;
    background: #ff4da6;
    color: white;

    z-index: 20;
}


/* Mobile friendly */
@media (min-width: 768px) {
    .credit {
        font-size: 14px;
    }
}
.credit {
    position: fixed;
    bottom: 15px;
    right: 15px;  /* RIGHT side */

    text-align: right;
    font-size: 11px;
    color: rgb(17, 10, 224);

    z-index: 20;
    opacity: 0.9;
}

</style>

</head>
<body>
    <audio id="bgMusic" loop>
    <source src="./happy.mp3" type="audio/mpeg">
</audio>
<button id="playBtn">🎵 Play Music</button>
    <h1 class="birthday-text"></h1>
   

<div class="scene">
    <div class="cube" id="cube">

        <div class="face front"  style="background-image: url('bg.jpeg');"></div>
        <div class="face back"   style="background-image: url('./c1.jpeg');"></div>
        <div class="face right"  style="background-image: url('./c2.jpeg');"></div>
        <div class="face left"   style="background-image: url('./c3.jpeg');"></div>
        <div class="face top"    style="background-image: url('./c4.jpeg');"></div>
        <div class="face bottom" style="background-image: url('./c5.jpeg');"></div>

    </div>
</div>
  <p class="credit">Software Engineer<br> 
      AKASH RAUT[UI/UX]</p>
<script>
   
   
const music = document.getElementById("bgMusic");
const btn = document.getElementById("playBtn");

btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        btn.innerText = "⏸ Pause";
    } else {
        music.pause();
        btn.innerText = "🎵 Play Music";
    }
});



window.onload = function () {

    // 🎵 MUSIC
    const music = document.getElementById("bgMusic");
    const btn = document.getElementById("playBtn");

    btn.addEventListener("click", () => {
        if (music.paused) {
            music.play();
            btn.innerText = "⏸ Pause";
        } else {
            music.pause();
            btn.innerText = "🎵 Play Music";
        }
    });

    // ✍️ TYPING TEXT
    const text = "Happy Birthday Akanksha Babu 💖";
    let i = 0;
    const el = document.querySelector(".birthday-text");

    function typeWriter() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 80);
        }
    }

    el.innerHTML = "";
    typeWriter();

};

cube.addEventListener("click", () => {
    speed = speed === 8 ? 3 : 8;
    cube.style.animation = `rotateCube ${speed}s infinite linear`;
});

function createEmoji() {
    const emoji = document.createElement("div");

    const emojis = ["🎂","🎉","🎈","💖","✨"];
    emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    emoji.style.position = "fixed";
    emoji.style.bottom = "-30px";
    emoji.style.left = Math.random() * window.innerWidth + "px";
    emoji.style.fontSize = (20 + Math.random() * 20) + "px";
    emoji.style.opacity = 0.8;
    emoji.style.zIndex = 5;
    emoji.style.pointerEvents = "none";

    document.body.appendChild(emoji);

    let pos = -30;

    let rise = setInterval(() => {
        pos += 3;
        emoji.style.bottom = pos + "px";

        if (pos > window.innerHeight) {
            emoji.remove();
            clearInterval(rise);
        }
    }, 20);
}

// continuous effect
setInterval(createEmoji, 300);
</script>


</body>
</html>
